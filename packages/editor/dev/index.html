<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title> Editor Dev</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    #controls { padding: 10px; background: #f5f5f5; border-bottom: 1px solid #ddd; display: flex; gap: 10px; align-items: center; }
    #controls label { font-size: 14px; font-weight: 500; }
    #controls select { padding: 4px 8px; font-size: 14px; }
    #apollon { height: calc(100vh - 45px); }
  </style>
</head>
<body>
  <div id="controls">
    <label for="diagram-type">Diagram Type:</label>
    <select id="diagram-type">
      <option value="ClassDiagram" selected>Class Diagram</option>
      <option value="ObjectDiagram">Object Diagram</option>
      <option value="ActivityDiagram">Activity Diagram</option>
      <option value="UseCaseDiagram">Use Case Diagram</option>
      <option value="CommunicationDiagram">Communication Diagram</option>
      <option value="ComponentDiagram">Component Diagram</option>
      <option value="DeploymentDiagram">Deployment Diagram</option>
      <option value="PetriNet">Petri Net</option>
      <option value="ReachabilityGraph">Reachability Graph</option>
      <option value="SyntaxTree">Syntax Tree</option>
      <option value="Flowchart">Flowchart</option>
      <option value="BPMN">BPMN</option>
      <option value="StateMachineDiagram">State Machine Diagram</option>
      <option value="AgentDiagram">Agent Diagram</option>
      <option value="UserDiagram">User Diagram</option>
    </select>
  </div>
  <div id="apollon"></div>
</body>
</html>
